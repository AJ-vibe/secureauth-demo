services:
  - type: web
    name: secureauth-demo
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 -u server.py
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHONUNBUFFERED
        value: "1"
      # VAPID keys — set these in the Render dashboard (Environment tab).
      # Using sync:false so deploys never overwrite your dashboard values.
      # Generate keys once with: python3 make_vapid_keys.py
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
